<!DOCTYPE html>

<html lang="en-us">

<head>
  <meta charset="utf-8" />

  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

  <!-- Content Security Policy - Allow unsafe-eval for Emscripten WASM -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';">

  <title>Engine 0.1</title>

  <style>
    body {
      margin: 0;
      background-color: #1a1a2e;
    }
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 800px;
      height: 600px;
      margin: auto;
      right: 0;
      bottom: 0;
    }
    canvas.emscripten {
      width: 800px;
      height: 600px;
      border: 0;
      background-color: #1a1a2e;
    }
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #1a1a2e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.3s ease-out;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #16213e;
      border-top: 4px solid #e94560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #loading-text {
      color: #eee;
      font-family: Arial, sans-serif;
      margin-top: 20px;
      font-size: 14px;
    }
    #loading-progress {
      width: 200px;
      height: 4px;
      background-color: #16213e;
      border-radius: 2px;
      margin-top: 15px;
      overflow: hidden;
    }
    #loading-progress-bar {
      width: 0%;
      height: 100%;
      background-color: #e94560;
      transition: width 0.2s ease-out;
    }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">Loading...</div>
  <div id="loading-progress">
    <div id="loading-progress-bar"></div>
  </div>
</div>

<div id="canvas-container">
  <canvas class="emscripten" id="canvas" tabindex="-1"></canvas>
</div>

<script type="text/javascript">

  function StartGame() {
    console.log("Start Game");
    var canvas = document.getElementById("canvas");
    setCanvasSize(canvas);
    setCanvasContextLostHandler(canvas);
  }

  function setCanvasSize(canvasElement) {
    console.log("setCanvasSize");

    const canvasContainerElement = document.getElementById(
            "canvas-container"
    );

    canvasElement.width = canvasContainerElement.clientWidth;
    canvasElement.height = canvasContainerElement.clientHeight;
  }

  function setCanvasContextLostHandler(canvasElement) {
    console.log("setCanvasContextLostHandler");

    canvasElement.addEventListener("webglcontextlost", (event) => {
      event.preventDefault();
      alert("WebGL context lost. You will need to reload the page.");
    });
  }

  var Module = {
    preRun: [],

    postRun: [],

    print: (function () {
      console.log("function output");

      var element = document.getElementById("output");

      if (element) element.value = ""; // clear browser cache

      return function (text) {
        if (arguments.length > 1)
          text = Array.prototype.slice.call(arguments).join(" ");
        console.log(text);

        if (element) {
          element.value += text + "\n";

          element.scrollTop = element.scrollHeight; // focus on bottom
        }
      };
    })(),

    printErr: function (text) {

      if (arguments.length > 1)
        text = Array.prototype.slice.call(arguments).join(" ");

      console.error(text);
    },

    canvas: (function () {
      console.log("function canvas");

      var canvas = document.getElementById("canvas");
      var back = document.getElementById("backId");
      if (back)
        back.remove();

      setCanvasSize(canvas);
      setCanvasContextLostHandler(canvas);
      return canvas;
    })(),

    onRuntimeInitialized: function() {
      console.log("Runtime initialized - hiding loader");
      var overlay = document.getElementById('loading-overlay');
      if (overlay) {
        overlay.classList.add('hidden');
      }
    },

    setStatus: function (text) {
      console.log(text);

      var loadingText = document.getElementById('loading-text');
      var progressBar = document.getElementById('loading-progress-bar');
      var overlay = document.getElementById('loading-overlay');

      if (!Module.setStatus.last)
        Module.setStatus.last = { time: Date.now(), text: "" };

      if (text === Module.setStatus.last.text) return;

      var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);

      var now = Date.now();

      if (m && now - Module.setStatus.last.time < 30) return; // if this is a progress update, skip it if too soon

      Module.setStatus.last.time = now;
      Module.setStatus.last.text = text;

      // Update loading UI
      if (loadingText) {
        if (m) {
          var progress = parseInt(m[2]) / parseInt(m[4]) * 100;
          loadingText.textContent = m[1].trim() + ' ' + Math.round(progress) + '%';
          if (progressBar) progressBar.style.width = progress + '%';
        } else if (text) {
          loadingText.textContent = text;
        }
      }

      // Hide overlay when complete
      if (text === 'All downloads complete.' && overlay) {
        setTimeout(function() {
          overlay.classList.add('hidden');
        }, 300);
      }
    },

    totalDependencies: 0,

    monitorRunDependencies: function (left) {
      this.totalDependencies = Math.max(this.totalDependencies, left);

      Module.setStatus(
              left
                      ? "Preparing... (" +
                      (this.totalDependencies - left) +
                      "/" +
                      this.totalDependencies +
                      ")"
                      : "All downloads complete."
      );
    },
  };
  console.log("Module.setStatus");

  Module.setStatus("Downloading...");

  window.onerror = function () {
    Module.setStatus("Exception thrown, see JavaScript console");
  };

</script>
{{{ SCRIPT }}}
</body>
</html>
